<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aasai Achagam — We print ur Aasai</title>
<meta name="description" content="Aasai Achagam - Invitations, brochures, business cards and temple printables">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Yeseva+One&family=Mukta:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<!-- decorative top border -->
<div class="kolam-strip" aria-hidden="true"></div>

<header class="hero">
  <div class="hero-inner">
    <h1 class="shop-name" id="shopNameEl">Aasai Achagam</h1>
    <p class="hero-tagline" id="taglineEl">We print ur aasai ^_`</p>
    <div class="hero-divider" aria-hidden="true">
      <svg viewBox="0 0 300 20" preserveAspectRatio="none"><path d="M0,10 Q75,0 150,10 T300,10" /></svg>
    </div>
  </div>
</header>

<nav class="tabs-wrap" aria-label="Product categories">
  <div class="tabs" id="tabs"></div>
</nav>

<div class="toolbar">
  <div class="toolbar-left">
    <span class="result-count" id="resultCount"></span>
  </div>
  <div class="toolbar-right">
    <label class="sort-label" for="sortSelect">Sort</label>
    <select id="sortSelect" class="sort-select">
      <option value="default">Featured</option>
      <option value="price-asc">Price: Low to High</option>
      <option value="price-desc">Price: High to Low</option>
    </select>

    <div class="view-toggle" role="group" aria-label="View mode">
      <button id="cardViewBtn" class="view-btn active" title="Card view" aria-pressed="true">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="2"/><rect x="13" y="3" width="8" height="8" rx="2"/><rect x="3" y="13" width="8" height="8" rx="2"/><rect x="13" y="13" width="8" height="8" rx="2"/></svg>
      </button>
      <button id="listViewBtn" class="view-btn" title="List view" aria-pressed="false">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="3" rx="1.5"/><rect x="3" y="10.5" width="18" height="3" rx="1.5"/><rect x="3" y="17" width="18" height="3" rx="1.5"/></svg>
      </button>
    </div>
  </div>
</div>

<main id="gallery" class="gallery card-view"></main>

<p class="empty-state" id="emptyState" hidden>No designs in this category yet.</p>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" hidden>
  <div class="lightbox-backdrop" id="lightboxBackdrop"></div>
  <div class="lightbox-inner">
    <button class="lb-close" id="lbClose" aria-label="Close">&times;</button>
    <div class="lb-stage">
      <button class="lb-nav lb-prev" id="lbPrev" aria-label="Previous image">&#10094;</button>
      <div class="lb-image-wrap">
        <img id="lbImage" src="" alt="">
        <div class="watermark-overlay" aria-hidden="true"></div>
      </div>
      <button class="lb-nav lb-next" id="lbNext" aria-label="Next image">&#10095;</button>
    </div>
    <div class="lb-caption">
      <span id="lbTitle"></span>
      <span class="lb-counter" id="lbCounter"></span>
    </div>
  </div>
</div>

<!-- toast for share/download feedback -->
<div class="toast" id="toast" hidden></div>

<footer class="site-footer">
  <div class="footer-inner">
    <p class="footer-tagline">Printed with love, styled for everyone's aasai ✿</p>
    <a class="footer-link" href="https://share.google/m95WsFo0aLoLmU81n" target="_blank" rel="noopener">
      View our Google Profile
    </a>
    <a class="footer-link" href="https://maps.app.goo.gl/M24x2MB9bk57PgvW9" target="_blank" rel="noopener">
      Vist the Store at
    </a>
    <a class="footer-link" href="https://wa.me/9843319470" target="_blank" rel="noopener">
      Chat us
    </a>
  </div>
</footer>

<script src="assets/js/config.js"></script>
<script src="assets/js/sheets-loader.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
